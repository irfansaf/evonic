{% extends "base.html" %}

{% block content %}
<div class="settings-container">
    <div class="settings-header">
        <h2>🤖 Model Settings</h2>
        <div class="settings-actions">
            <button onclick="showAddModelModal()" class="btn-primary">+ Add Model</button>
        </div>
    </div>

    <!-- Tabs -->
    <div class="settings-tabs">
        <button class="tab-btn active" onclick="showModelsTab('global')">Global Default</button>
        <button class="tab-btn" onclick="showModelsTab('agents')">Per-Agent Assignment</button>
    </div>

    <!-- Global Default Tab -->
    <div id="global-tab" class="tab-content active">
        <div class="space-y-4">
            <!-- Current Global Default -->
            <div class="p-4 bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
                <div class="font-medium text-gray-800 dark:text-gray-200 mb-2">Current Global Default</div>
                <div id="global-default-display" class="text-sm text-gray-600 dark:text-gray-400">
                    Loading...
                </div>
            </div>

            <!-- All Models List -->
            <div class="space-y-2" id="models-list">
                <!-- Models will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Per-Agent Assignment Tab -->
    <div id="agents-tab" class="tab-content">
        <div class="space-y-2" id="agents-list">
            <!-- Agents with model assignments will be loaded here -->
        </div>
    </div>
</div>

<!-- Add/Edit Model Modal -->
<div id="model-modal" class="hidden fixed inset-0 z-[1000] flex items-center justify-center p-5 bg-black/50">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-title">Add Model</h3>
            <button onclick="closeModal()" class="modal-close">&times;</button>
        </div>
        <form id="model-form" onsubmit="saveModel(event)">
            <input type="hidden" id="model-id">
            
            <div class="form-group">
                <label>Model Name *</label>
                <input type="text" id="model-name" required class="form-input">
            </div>

            <div class="form-group">
                <label>Type *</label>
                <select id="model-type" class="form-input" onchange="toggleModelFields()">
                    <option value="remote">Remote</option>
                    <option value="local">Local</option>
                </select>
            </div>

            <div class="form-group">
                <label>Provider *</label>
                <select id="model-provider" class="form-input">
                    <option value="openrouter">OpenRouter</option>
                    <option value="togetherai">TogetherAI</option>
                    <option value="ollama">Ollama</option>
                    <option value="llama.cpp">llama.cpp</option>
                    <option value="custom">Custom</option>
                </select>
            </div>

            <div class="form-group" id="base-url-group">
                <label>Base URL *</label>
                <input type="url" id="model-base-url" class="form-input" placeholder="https://openrouter.ai/api/v1">
            </div>

            <div class="form-group" id="api-key-group">
                <label>API Key</label>
                <input type="password" id="model-api-key" class="form-input" placeholder="sk-or-...">
            </div>

            <div class="form-group">
                <label>Model Name *</label>
                <input type="text" id="model-name-param" required class="form-input" placeholder="anthropic/claude-3.5-sonnet">
            </div>

            <div class="form-group">
                <label>Max Tokens</label>
                <input type="number" id="model-max-tokens" class="form-input" value="32768" min="1">
            </div>

            <div class="form-group">
                <label>Timeout (seconds)</label>
                <input type="number" id="model-timeout" class="form-input" value="60" min="1">
            </div>

            <div class="form-group">
                <label>Max Concurrent Turns (0 = unlimited)</label>
                <input type="number" id="model-max-concurrent" class="form-input" value="1" min="0">
                <p class="text-xs text-gray-400 mt-1">Limit parallel agent turns using this model. 0 = unlimited.</p>
            </div>

            <div class="form-group">
                <label>Temperature (leave empty for server default)</label>
                <input type="number" id="model-temperature" class="form-input" placeholder="e.g. 0.7" step="0.1" min="0" max="2">
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="model-thinking" checked> Enable Thinking Mode
                </label>
            </div>

            <div class="form-group" id="thinking-budget-group">
                <label>Thinking Budget (tokens, 0 = default)</label>
                <input type="number" id="model-thinking-budget" class="form-input" value="0" min="0">
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="model-enabled" checked> Enabled
                </label>
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="model-is-default"> Set as Global Default
                </label>
            </div>

            <div class="form-actions">
                <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
                <button type="submit" class="btn-primary">Save Model</button>
            </div>
        </form>
    </div>
</div>

<!-- Test Connection Modal -->
<div id="test-modal" class="hidden fixed inset-0 z-[1000] flex items-center justify-center p-5 bg-black/50">
    <div class="modal-content" style="max-width: 500px;">
        <div class="modal-header">
            <h3>Test Connection</h3>
            <button onclick="closeTestModal()" class="modal-close">&times;</button>
        </div>
        <div id="test-status" class="p-4">
            <div class="text-center">
                <div class="spinner"></div>
                <p class="mt-2">Testing connection...</p>
            </div>
        </div>
    </div>
</div>

    }

        flex: 1;

    }

        background: #1f2937;

        color: #d1d5db;
    }
    html.dark .btn-sm:hover {
        background: #374151;
    }
    .btn-sm.btn-danger {
        border-color: #ef4444;
        color: #ef4444;
    }
    .btn-sm.btn-danger:hover {
        background: #fef2f2;
    }
    html.dark .btn-sm.btn-danger:hover {
        background: #451a1a;
    }
    .btn-sm.btn-primary {
        border-color: #6366f1;
        color: #6366f1;
    }
    .btn-sm.btn-primary:hover {
        background: #eef2ff;
    }
    html.dark .btn-sm.btn-primary:hover {
        background: #1e1b4b;
    }
    .form-group {
        margin-bottom: 16px;
    }
    .form-group label {
        display: block;
        margin-bottom: 4px;
        font-size: 14px;
        color: #374151;
    }
    html.dark .form-group label {
        color: #d1d5db;
    }
    .form-input {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #d1d5db;
        border-radius: 4px;

        background: white;

    }

    .modal-content {

        transform: translateY(8px);

        transform: translateY(0);

        display: flex;

    }

        border-bottom-color: #374151;

    #model-form {
        overflow-y: auto;
        padding: 20px;
        flex: 1;
    }
</style>

<script>
let allModels = [];
let allAgents = [];

// Load data on page load
document.addEventListener('DOMContentLoaded', () => {
    loadModels();
    loadAgents();
    // Close modals on backdrop click
    document.getElementById('model-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
    document.getElementById('test-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeTestModal(); });
});

function showModelsTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    
    if (tab === 'global') {
        document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
        document.getElementById('global-tab').classList.add('active');
    } else {
        document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
        document.getElementById('agents-tab').classList.add('active');
    }
}

async function loadModels() {
    try {
        const response = await fetch('/api/models');
        const data = await response.json();
        allModels = data.models || [];
        renderModels();
    } catch (error) {
        console.error('Failed to load models:', error);
    }
}

function renderModels() {
    // Render global default display
    const globalDefault = allModels.find(m => m.is_default);
    const globalDisplay = document.getElementById('global-default-display');
    const badgeBase = 'inline-block px-2 py-0.5 rounded-full text-[11px] font-medium mr-2';
    const typeClass = globalDefault.type === 'remote'
        ? `${badgeBase} bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-300`
        : `${badgeBase} bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-300`;
    if (globalDefault) {
        globalDisplay.innerHTML = `
            <span class="${typeClass}">${globalDefault.type}</span>
            <span class="${badgeBase} bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-300">Enabled</span>
            ${globalDefault.name} (${globalDefault.model_name})
        `;
    } else {
        globalDisplay.textContent = 'No global default set';
    }

    // Render models list
    const modelsList = document.getElementById('models-list');
    if (allModels.length === 0) {
        modelsList.innerHTML = '<p class="text-gray-500 text-center py-4">No models configured. Click "Add Model" to get started.</p>';
        return;
    }

    modelsList.innerHTML = allModels.map(model => {
        const badgeBase = 'inline-block px-2 py-0.5 rounded-full text-[11px] font-medium mr-2';
        const typeClass = model.type === 'remote'
            ? `${badgeBase} bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-300`
            : `${badgeBase} bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-300`;
        const statusClass = model.enabled
            ? `${badgeBase} bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-300`
            : `${badgeBase} bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-300`;
        const defaultBadge = model.is_default
            ? `<span class="${badgeBase} bg-indigo-600 text-white dark:bg-indigo-800 dark:text-indigo-200">Default</span>`
            : '';
        const thinkingBadge = model.thinking
            ? `<span class="${badgeBase} bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-300">Thinking</span>`
            : '';
        return `
        <div class="model-card ${model.is_default ? 'is-default' : ''}">
            <div class="model-info">
                <div class="model-name">
                    ${model.name}
                    ${defaultBadge}
                </div>
                <div class="model-meta">
                    <span class="${typeClass}">${model.type}</span>
                    <span class="${statusClass}">${model.enabled ? 'Enabled' : 'Disabled'}</span>
                    ${thinkingBadge}
                    <br>
                    ${model.provider} | ${model.model_name} | ${model.base_url || 'N/A'}
                </div>
            </div>
            <div class="model-actions">
                <button class="btn-sm" onclick="testConnection('${model.id}')">Test</button>
                <button class="btn-sm btn-primary" onclick="editModel('${model.id}')">Edit</button>
                ${!model.is_default ? `<button class="btn-sm" onclick="setDefaultModel('${model.id}')">Set Default</button>` : ''}
                <button class="btn-sm btn-danger" onclick="deleteModel('${model.id}')">Delete</button>
            </div>
        </div>
        `;
    }).join('');
}

async function loadAgents() {
    try {
        const response = await fetch('/api/agents');
        const data = await response.json();
        allAgents = data.agents || [];
        renderAgents();
    } catch (error) {
        console.error('Failed to load agents:', error);
    }
}

function renderAgents() {
    const agentsList = document.getElementById('agents-list');
    if (allAgents.length === 0) {
        agentsList.innerHTML = '<p class="text-gray-500 text-center py-4">No agents found.</p>';
        return;
    }

    agentsList.innerHTML = allAgents.map(agent => {
        const currentModel = allModels.find(m => m.id === agent.default_model_id);
        const options = allModels.map(m => 
            `<option value="${m.id}" ${m.id === agent.default_model_id ? 'selected' : ''}>${m.name} (${m.model_name})</option>`
        ).join('');
        
        return `
            <div class="agent-row">
                <span class="agent-name">${agent.name}</span>
                <select class="agent-select" onchange="setAgentModel('${agent.id}', this.value)">
                    <option value="">-- Use Global Default --</option>
                    ${options}
                </select>
            </div>
        `;
    }).join('');
}

function showAddModelModal() {
    document.getElementById('modal-title').textContent = 'Add Model';
    document.getElementById('model-form').reset();
    document.getElementById('model-id').value = '';
    document.getElementById('model-modal').classList.remove('hidden');
}

function editModel(modelId) {
    const model = allModels.find(m => m.id === modelId);
    if (!model) return;

    document.getElementById('modal-title').textContent = 'Edit Model';
    document.getElementById('model-id').value = model.id;
    document.getElementById('model-name').value = model.name || '';
    document.getElementById('model-type').value = model.type || 'remote';
    document.getElementById('model-provider').value = model.provider || 'custom';
    document.getElementById('model-base-url').value = model.base_url || '';
    document.getElementById('model-api-key').value = model.api_key || '';
    document.getElementById('model-name-param').value = model.model_name || '';
    document.getElementById('model-max-tokens').value = model.max_tokens || 32768;
    document.getElementById('model-timeout').value = model.timeout || 60;
    document.getElementById('model-max-concurrent').value = model.max_concurrent != null ? model.max_concurrent : 1;
    document.getElementById('model-temperature').value = model.temperature != null ? model.temperature : '';
    document.getElementById('model-thinking').checked = !!model.thinking;
    document.getElementById('model-thinking-budget').value = model.thinking_budget || 0;
    document.getElementById('model-enabled').checked = !!model.enabled;
    document.getElementById('model-is-default').checked = !!model.is_default;
    
    toggleModelFields();
    document.getElementById('model-modal').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('model-modal').classList.add('hidden');
}

function toggleModelFields() {
    const type = document.getElementById('model-type').value;
    const provider = document.getElementById('model-provider').value;
    
    // Show/hide API key field based on type
    const apiKeyGroup = document.getElementById('api-key-group');
    if (type === 'local' && (provider === 'ollama' || provider === 'llama.cpp')) {
        apiKeyGroup.style.display = 'none';
    } else {
        apiKeyGroup.style.display = 'block';
    }
}

async function saveModel(event) {
    event.preventDefault();
    
    const modelId = document.getElementById('model-id').value;
    const modelData = {
        name: document.getElementById('model-name').value,
        type: document.getElementById('model-type').value,
        provider: document.getElementById('model-provider').value,
        base_url: document.getElementById('model-base-url').value,
        api_key: document.getElementById('model-api-key').value,
        model_name: document.getElementById('model-name-param').value,
        max_tokens: parseInt(document.getElementById('model-max-tokens').value) || 32768,
        timeout: parseInt(document.getElementById('model-timeout').value) || 60,
        max_concurrent: parseInt(document.getElementById('model-max-concurrent').value) || 0,
        temperature: document.getElementById('model-temperature').value !== '' ? parseFloat(document.getElementById('model-temperature').value) : null,
        thinking: document.getElementById('model-thinking').checked ? 1 : 0,
        thinking_budget: parseInt(document.getElementById('model-thinking-budget').value) || 0,
        enabled: document.getElementById('model-enabled').checked ? 1 : 0,
        is_default: document.getElementById('model-is-default').checked ? 1 : 0,
    };

    try {
        let response;
        if (modelId) {
            response = await fetch(`/api/models/${modelId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(modelData)
            });
        } else {
            response = await fetch('/api/models', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(modelData)
            });
        }

        const result = await response.json();
        if (result.success) {
            closeModal();
            await loadModels();
            await loadAgents();
            toast.success(modelId ? 'Model settings updated successfully.' : 'Model added successfully.', 5000);
        } else {
            toast.error(result.error || 'Failed to save model settings.', 5000);
        }
    } catch (error) {
        console.error('Failed to save model:', error);
        toast.error('Failed to update model settings: ' + error.message, 5000);
    }
}

async function setDefaultModel(modelId) {
    try {
        const response = await fetch(`/api/models/${modelId}/set-default`, {
            method: 'POST'
        });
        const result = await response.json();
        if (result.success) {
            await loadModels();
        } else {
            alert('Error: ' + (result.error || 'Failed to set default'));
        }
    } catch (error) {
        console.error('Failed to set default:', error);
    }
}

async function deleteModel(modelId) {
    const confirmed = await showConfirm({
        title: 'Delete Model',
        message: 'Are you sure you want to delete this model?',
        confirmText: 'Delete',
        cancelText: 'Cancel',
        danger: true
    });
    if (!confirmed) return;
    
    try {
        const response = await fetch(`/api/models/${modelId}`, {
            method: 'DELETE'
        });
        const result = await response.json();
        if (result.success) {
            await loadModels();
            await loadAgents();
        } else {
            alert('Error: ' + (result.error || 'Failed to delete model'));
        }
    } catch (error) {
        console.error('Failed to delete model:', error);
    }
}

async function testConnection(modelId) {
    const testModal = document.getElementById('test-modal');
    const testStatus = document.getElementById('test-status');
    testModal.classList.remove('hidden');
    testStatus.innerHTML = '<div class="text-center"><div class="spinner"></div><p class="mt-2">Testing connection...</p></div>';

    try {
        const response = await fetch(`/api/models/${modelId}/test`, {
            method: 'POST'
        });
        const result = await response.json();
        
        if (result.success) {
            testStatus.innerHTML = `
                <div class="p-4 bg-green-50 border border-green-200 rounded-lg">
                    <div class="text-green-800 font-medium">✅ Connection Successful</div>
                    <div class="text-green-700 mt-1">${result.message}</div>
                    <div class="text-green-600 mt-1">Available models: ${result.available_models}</div>
                </div>
            `;
        } else {
            testStatus.innerHTML = `
                <div class="p-4 bg-red-50 border border-red-200 rounded-lg">
                    <div class="text-red-800 font-medium">❌ Connection Failed</div>
                    <div class="text-red-700 mt-1">${result.error}</div>
                    ${result.status_code ? `<div class="text-red-600 mt-1">Status: ${result.status_code}</div>` : ''}
                </div>
            `;
        }
    } catch (error) {
        testStatus.innerHTML = `
            <div class="p-4 bg-red-50 border border-red-200 rounded-lg">
                <div class="text-red-800 font-medium">❌ Connection Failed</div>
                <div class="text-red-700 mt-1">${error.message}</div>
            </div>
        `;
    }
}

function closeTestModal() {
    document.getElementById('test-modal').classList.add('hidden');
}

async function setAgentModel(agentId, modelId) {
    try {
        const response = await fetch(`/api/agents/${agentId}/model`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({model_id: modelId || null})
        });
        const result = await response.json();
        if (!result.success) {
            alert('Error: ' + (result.error || 'Failed to set model'));
        }
    } catch (error) {
        console.error('Failed to set agent model:', error);
    }
}
</script>
{% endblock %}
